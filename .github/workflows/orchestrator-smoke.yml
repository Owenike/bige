name: Orchestrator Smoke

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Orchestrator task profile id
        required: false
        default: default
        type: string
      run_live_smoke:
        description: Run the live OpenAI executor smoke path
        required: false
        default: false
        type: boolean
      run_live_acceptance:
        description: Run the live OpenAI executor acceptance path
        required: false
        default: false
        type: boolean
      run_live_pass:
        description: Run the live OpenAI executor pass path
        required: false
        default: false
        type: boolean
      run_supabase_live_smoke:
        description: Run the live Supabase backend smoke path
        required: false
        default: false
        type: boolean

jobs:
  orchestrator-validation:
    name: Orchestrator Validation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Orchestrator preflight summary
        shell: pwsh
        run: |
          npm run orchestrator:init -- --state-id workflow-preflight --goal "Workflow preflight" --objective "Inspect orchestrator readiness" --subtasks "preflight,profiles,diagnostics,workflow" --success-criteria "preflight summary is readable" --profile "${{ inputs.profile }}"
          npm run orchestrator:preflight -- --state-id workflow-preflight
          npm run orchestrator:diagnostics -- --state-id workflow-preflight

      - name: Orchestrator acceptance suite
        shell: pwsh
        run: |
          npm run test:orchestrator:typecheck
          npm run test:orchestrator:lint
          npm run test:orchestrator:unit
          npm run test:orchestrator:integration
          npm run test:orchestrator:schema
          npm run test:orchestrator:policy
          npm run test:orchestrator:providers
          npm run test:orchestrator:storage
          npm run test:orchestrator:executor-provider
          npm run test:orchestrator:workspace
          npm run test:orchestrator:patch-flow
          npm run test:orchestrator:promotion
          npm run test:orchestrator:promotion-branch
          npm run test:orchestrator:artifacts
          npm run test:orchestrator:cleanup
          npm run test:orchestrator:handoff
          npm run test:orchestrator:pr-draft
          npm run test:orchestrator:audit
          npm run test:orchestrator:github-handoff
          npm run test:orchestrator:promotion-config
          npm run test:orchestrator:live-evidence
          npm run test:orchestrator:retention-config
          npm run test:orchestrator:preflight
          npm run test:orchestrator:profiles
          npm run test:orchestrator:diagnostics
          npm run test:orchestrator:webhook-runtime
          npm run test:orchestrator:github-live-report
          npm run test:orchestrator:actor-policy-config
          npm run test:orchestrator:runtime-config
          npm run test:orchestrator:webhook-hosting
          npm run test:orchestrator:graceful-shutdown
          npm run test:orchestrator:queue
          npm run test:orchestrator:worker
          npm run test:orchestrator:locking
          npm run test:orchestrator:recovery
          npm run test:orchestrator:supabase-backend
          npm run test:orchestrator:remote-locking
          npm run test:orchestrator:backend-migration
          npm run test:orchestrator:remote-diagnostics
          npm run test:orchestrator:supabase-live
          npm run test:orchestrator:backend-transfer
          npm run test:orchestrator:multi-worker-remote
          npm run test:orchestrator:backend-health
          npm run test:orchestrator:mock-loop
          npm run test:orchestrator:loop
          npm run test:orchestrator:state-machine
          npm run test:orchestrator:live-acceptance
          npm run test:orchestrator:live-pass

  orchestrator-live-smoke:
    name: Orchestrator Live Smoke
    needs: orchestrator-validation
    runs-on: windows-latest
    if: ${{ inputs.run_live_smoke }}

    steps:
      - name: Decide live smoke policy
        id: policy
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if (-not $env:OPENAI_API_KEY) {
            "run_live=false" >> $env:GITHUB_OUTPUT
            "skip_reason=orchestrator live smoke skipped because OPENAI_API_KEY is missing." >> $env:GITHUB_OUTPUT
            exit 0
          }

          "run_live=true" >> $env:GITHUB_OUTPUT
          "skip_reason=orchestrator live smoke is ready to run." >> $env:GITHUB_OUTPUT

      - name: Report live smoke skip
        if: ${{ steps.policy.outputs.run_live != 'true' }}
        shell: pwsh
        run: |
          Write-Host "::notice title=Orchestrator live smoke skipped::${{ steps.policy.outputs.skip_reason }}"

      - name: Checkout
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        run: npm ci

      - name: Run orchestrator live smoke
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run test:orchestrator:live-smoke

  orchestrator-live-acceptance:
    name: Orchestrator Live Acceptance
    needs: orchestrator-validation
    runs-on: windows-latest
    if: ${{ inputs.run_live_acceptance }}

    steps:
      - name: Decide live acceptance policy
        id: policy
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if (-not $env:OPENAI_API_KEY) {
            "run_live=false" >> $env:GITHUB_OUTPUT
            "skip_reason=orchestrator live acceptance skipped because OPENAI_API_KEY is missing." >> $env:GITHUB_OUTPUT
            exit 0
          }

          "run_live=true" >> $env:GITHUB_OUTPUT
          "skip_reason=orchestrator live acceptance is ready to run." >> $env:GITHUB_OUTPUT

      - name: Report live acceptance skip
        if: ${{ steps.policy.outputs.run_live != 'true' }}
        shell: pwsh
        run: |
          Write-Host "::notice title=Orchestrator live acceptance skipped::${{ steps.policy.outputs.skip_reason }}"

      - name: Checkout
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        run: npm ci

      - name: Run orchestrator live acceptance
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run test:orchestrator:live-acceptance

  orchestrator-live-pass:
    name: Orchestrator Live Pass
    needs: orchestrator-validation
    runs-on: windows-latest
    if: ${{ inputs.run_live_pass }}

    steps:
      - name: Decide live pass policy
        id: policy
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if (-not $env:OPENAI_API_KEY) {
            "run_live=false" >> $env:GITHUB_OUTPUT
            "skip_reason=orchestrator live pass skipped because OPENAI_API_KEY is missing." >> $env:GITHUB_OUTPUT
            exit 0
          }

          "run_live=true" >> $env:GITHUB_OUTPUT
          "skip_reason=orchestrator live pass is ready to run." >> $env:GITHUB_OUTPUT

      - name: Report live pass skip
        if: ${{ steps.policy.outputs.run_live != 'true' }}
        shell: pwsh
        run: |
          Write-Host "::notice title=Orchestrator live pass skipped::${{ steps.policy.outputs.skip_reason }}"

      - name: Checkout
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        run: npm ci

      - name: Run orchestrator live pass
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run test:orchestrator:live-pass

  orchestrator-supabase-live-smoke:
    name: Orchestrator Supabase Live Smoke
    needs: orchestrator-validation
    runs-on: windows-latest
    if: ${{ inputs.run_supabase_live_smoke }}

    steps:
      - name: Decide Supabase live smoke policy
        id: policy
        shell: pwsh
        env:
          ORCHESTRATOR_SUPABASE_URL: ${{ secrets.ORCHESTRATOR_SUPABASE_URL }}
          ORCHESTRATOR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ORCHESTRATOR_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if (-not $env:ORCHESTRATOR_SUPABASE_URL -or -not $env:ORCHESTRATOR_SUPABASE_SERVICE_ROLE_KEY) {
            "run_live=false" >> $env:GITHUB_OUTPUT
            "skip_reason=orchestrator Supabase live smoke skipped because backend secrets are missing." >> $env:GITHUB_OUTPUT
            exit 0
          }

          "run_live=true" >> $env:GITHUB_OUTPUT
          "skip_reason=orchestrator Supabase live smoke is ready to run." >> $env:GITHUB_OUTPUT

      - name: Report Supabase live smoke skip
        if: ${{ steps.policy.outputs.run_live != 'true' }}
        shell: pwsh
        run: |
          Write-Host "::notice title=Orchestrator Supabase live smoke skipped::${{ steps.policy.outputs.skip_reason }}"

      - name: Checkout
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        run: npm ci

      - name: Run Supabase live smoke
        if: ${{ steps.policy.outputs.run_live == 'true' }}
        shell: pwsh
        env:
          ORCHESTRATOR_SUPABASE_URL: ${{ secrets.ORCHESTRATOR_SUPABASE_URL }}
          ORCHESTRATOR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ORCHESTRATOR_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:orchestrator:supabase-live
